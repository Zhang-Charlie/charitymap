name: Importer checks

on:
  pull_request:
    paths:
      - "importer/**"
      - ".github/workflows/importer.yml"
  push:
    branches: [main]
    paths:
      - "importer/**"
      - ".github/workflows/importer.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: importer

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest
